<!DOCTYPE html>
<html>
<head>
    <title>Opening Instagram...</title>
    <meta http-equiv="refresh" content="0;url=instagram://app">
</head>
<body style="background-color: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <script>
        // 2. JavaScript attempt to open the app immediately
        window.location.href = "instagram://app";

        // 3. Fallback: If the app isn't installed, redirect to the website after a short delay
        setTimeout(function() {
            window.location.href = "https://www.instagram.com";
        }, 2000);
    </script>

    <div style="text-align: center;">
        <p>Launching Instagram...</p>
        <p style="font-size: 12px; color: #888;">If nothing happens, <a href="instagram://app" style="color: #0095f6;">click here</a>.</p>
    </div>

</body>
</html>
