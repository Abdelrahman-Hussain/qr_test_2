<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Instagram</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #fafafa;
            margin: 0;
        }

        .container {
            text-align: center;
            padding: 20px;
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            width: 300px;
        }

        .logo {
            width: 175px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 18px;
            color: #262626;
            margin-bottom: 20px;
        }

        /* The "Open App" Button Styling */
        .btn-open {
            display: block;
            background-color: #0095f6;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .btn-open:hover {
            background-color: #1877f2;
        }

        .footer-links {
            margin-top: 20px;
            font-size: 12px;
            color: #8e8e8e;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" alt="Instagram" class="logo">
        
        <h1>Share everyday moments with your friends.</h1>

        <a href="https://www.instagram.com/" class="btn-open">Open Instagram</a>

        <div class="footer-links">
            <p>Don't have the app? <a href="https://www.instagram.com/" style="color: #00376b; text-decoration: none;">Log In</a></p>
        </div>
    </div>

</body>
</html>
