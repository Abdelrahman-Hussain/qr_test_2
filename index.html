<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct App Launch</title>
    <style>
        body {
            background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: sans-serif;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .btn-direct {
            background-color: #0095f6;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn-direct:active {
            transform: scale(0.95);
        }
        p { color: #666; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin-top:0;">Ready to switch?</h2>
        
        <a href="instagram://app" class="btn-direct">
            Open Instagram App Now
        </a>

        <p>This uses <code>instagram://</code> to bypass the browser.</p>
    </div>

</body>
</html>
